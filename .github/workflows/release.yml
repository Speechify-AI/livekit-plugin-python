name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - run: uv pip install --system -e . pytest pytest-asyncio ruff mypy
      - name: Lint
        run: |
          ruff check --line-length 100 --target-version py310 --select E,W,F,I,B,C4,UP livekit/ tests/
          ruff format --line-length 100 --check livekit/ tests/
      - name: Type check
        run: mypy livekit/plugins/speechify/tts.py --ignore-missing-imports
      - name: Test
        run: pytest tests/ -q
      - name: Build
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
